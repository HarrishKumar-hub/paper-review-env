name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_env.py

      - name: Run baseline inference (easy)
        run: python inference.py --difficulty easy

      - name: Run baseline inference (medium)
        run: python inference.py --difficulty medium

      - name: Run baseline inference (hard)
        run: python inference.py --difficulty hard
